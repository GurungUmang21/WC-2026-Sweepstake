<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 Sweepstake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0;}

  :root {
    --gold: #C9A84C;
    --pitch: #002E4F;
    --pitch-mid: #00213A;
    --pitch-light: #002E4F;
    --cream: #F5F0E8;
    --cream-dim: #DDD8CF;
    --accent: #E20F1D;
    --danger: #E05555;
    --success: #5DBD7A;
    --muted: rgba(245,240,232,0.45);
    --border: rgba(245,240,232,0.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--pitch);
    color: var(--cream);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* ── HEADER ── */
  header {
    max-width: 1200px;
    margin: 0 auto 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }
  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 58px);
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .header-left p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .status-pill {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .status-pill.pre { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .status-pill.live { background: rgba(93,189,122,0.15); color: var(--success); border: 1px solid rgba(93,189,122,0.3); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--cream-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { border-color: var(--gold); color: var(--gold); }
  .btn-refresh svg { width: 13px; height: 13px; }
  .btn-refresh.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATS ROW ── */
  .stats {
    max-width: 1200px;
    margin: 0 auto 2rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .stat {
    background: var(--pitch-mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--cream); letter-spacing: 1px; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 300; }

  /* ── LEADERBOARD ── */
  .section-title {
    max-width: 1200px;
    margin: 0 auto;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .section-title2 {
    max-width: 1200px;
    margin: 0 auto -5px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .leaderboard { display: flex; flex-direction: column; gap: 6px;}
  .upcoming-matches { margin: -35px auto; display: flex; flex-direction: column; gap: 6px; }
  .recent-results { margin: -35px auto; display: flex; flex-direction: column; gap: 6px; }
  
  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    align-items: start;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .right {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .entry {
    background: var(--pitch-mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    display: grid;
    grid-template-columns: 32px 1fr 120px 10px;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .entry:hover { border-color: rgba(245,240,232,0.2); }
  .entry.eliminated { opacity: 0.35; }
  .entry.rank-1 { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.06); }
  .entry.rank-2 { border-color: rgba(180,180,190,0.3); }
  .entry.rank-3 { border-color: rgba(160,110,70,0.3); }

  .rank-badge {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    background: var(--pitch-light);
    color: var(--muted);
  }
  .rank-badge.r1 { background: rgba(201,168,76,0.2); color: var(--gold); }
  .rank-badge.r2 { background: rgba(180,180,190,0.15); color: #B4B4BE; }
  .rank-badge.r3 { background: rgba(160,110,70,0.15); color: #A06E46; }

  .person-name { font-size: 15px; font-weight: 500; color: var(--cream); margin-bottom: 5px; }
  .countries { display: flex; gap: 5px; flex-wrap: wrap; }
  .ctag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px;
    background: var(--pitch-light);
    color: var(--cream-dim);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 4px;
  }
  .ctag.eliminated-tag { text-decoration: line-through; opacity: 0.5; }
  .ctag .flag { font-size: 13px; }

  .prob-col { text-align: right; }
  .prob-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--cream);
    letter-spacing: 1px;
    line-height: 1;
  }
  .prob-bar-wrap { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .prob-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

  .change-col { font-size: 11px; font-weight: 500; text-align: right; }
  .change-col.up { color: var(--success); }
  .change-col.down { color: var(--danger); }
  .change-col.flat { color: var(--muted); }

  /* ── BOTTOM PANELS ── */
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .panel {
    background: var(--pitch-mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px;
  }

  .panelStandings {
    background: var(--pitch-mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .panel-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }

  .result-row {
    display: grid; grid-template-columns: 1fr 44px 1fr;
    gap: 6px; align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-home { text-align: right; font-weight: 500; color: var(--cream-dim); }
  .result-away { font-weight: 500; color: var(--cream-dim); }
  
  .elim-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .elim-row:last-child { border-bottom: none; }
  .elim-name { display: flex; align-items: center; gap: 6px; color: var(--cream-dim); }
  .elim-stage { font-size: 10px; color: var(--muted); }

  .footer { max-width: 1200px; margin: 0 auto; font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; gap: 6px; }

  /* ── ERROR / LOADING ── */
  .notice {
    max-width: 1200px; margin: 0 auto 1rem;
    padding: 10px 14px; border-radius: 8px;
    font-size: 12px; display: none;
  }
  .notice.error { background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.3); color: #E08080; }
  .notice.info { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .panels { grid-template-columns: 1fr; }
    .entry { grid-template-columns: 32px 1fr 90px; }
    .change-col { display: none; }
    .main { grid-template-columns: 1fr; }
  }

  .match {
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
}
  .match:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.teams {
  display: grid;
  grid-template-columns: 2fr 35px 2fr;
  gap: 10px;
  align-items: start;
  /*margin-bottom: 5px;*/
}

.team-name {
  font-size: 12px;        /* ← reduce from 12px */
  font-weight: 500;
  color: var(--cream);
  display: block;
  word-break: break-word;
  line-height: 1.3;
  text-align: center;
  max-width: 90px;
}
.participant {
  font-size: 10px;
  color: var(--gold);
  display: block;
  margin-top: 1px;
}
.participant.none { color: var(--muted); }
.vs-badge {
  text-align: center;
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  background: var(--pitch-light);
  border-radius: 4px;
  padding: 2px 3px;
  margin-top: 8px; /* ← nudges vs down to align with the team name, below the crest */
  align-self: center;
}
.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-direction: column;
}
.venue {
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 3px;
}
.time { font-size: 10px; color: var(--muted); }

.crest { width: 24px; height: 24px; object-fit: contain; }
.standings-crest {
  width: 16px;
  height: 16px;
  object-fit: contain;
  flex-shrink: 0;
}

.home {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.away {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.ctag-crest {
  width: 16px;
  height: 16px;
  object-fit: contain;
  vertical-align: middle;
}

.view { display: none; }
.view.active { display: block; }

.toggle-bar {
  max-width: 1200px;   /* match your .main max-width */
  margin: 0 auto 10px; /* centres it and adds gap below */
  display: flex;
  grid-template-columns: 1fr 280px;
  gap: 6px;
}

.toggle-btn {
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--pitch-mid);
  color: var(--muted);
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.toggle-btn.active {
  background: var(--pitch-mid);
  color: var(--cream);
  border-color: rgba(245,240,232,0.3);
}

/* form dots */
.fd { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin: 0 1px; }
.fw    { background: var(--success); }
.fdraw { background: var(--gold); }
.fl    { background: var(--danger); }

/* position colours */
.top td:first-child { color: var(--success); font-weight: 700; }
.bot { opacity: 0.55; }
.bot td:first-child { color: var(--danger); }

#standings-table table {
  background: var(--pitch-mid);
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  table-layout: fixed;   /* ← forces columns to respect widths */
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow:hidden
  
}

#standings-table thead th {
  color: var(--muted);
  font-weight: 400;
  text-align: right;
  padding: 4px 5px;
  font-size: 14px;
  /*border-bottom: 1px solid var(--border);*/
  border-left: 0.5px solid var(--border);
  /*border: 0.5px solid var(--border);
  border-radius: 10px;*/
}

#standings-table thead th:nth-child(1) { text-align: center; width: 15px; }
#standings-table thead th:nth-child(2) { text-align: left; width: 80px; }
#standings-table thead th:nth-child(3) { text-align: center; width: 13px; }  /* Grp */
#standings-table thead th:nth-child(4),
#standings-table thead th:nth-child(5),
#standings-table thead th:nth-child(6),
#standings-table thead th:nth-child(7),
#standings-table thead th:nth-child(8),
#standings-table thead th:nth-child(9) { text-align: center; width: 15px; }
#standings-table thead th:nth-child(10) { text-align: center; width: 20px; }  /* P W D L GD Pts Prob% */
/*#standings-table thead th:nth-child(11){ width: 44px; }  Form */

#standings-table td {
  padding: 5px 5px;
  text-align: center;
  color: var(--cream);
  vertical-align: middle;   /* ← keeps everything in the middle of the row */
  white-space: nowrap;      /* ← stops text wrapping and breaking layout */
  border-left: 0.5px solid var(--border);
  border-top: 0.5px solid var(--border);
}

#standings-table td:first-child {
  text-align: center;
  color: var(--muted);
  font-size: 10px;
}

#standings-table tbody tr:last-child {
  /*border-bottom: 0.5px solid var(--border);*/
}

#standings-table .tc {
  display: flex;
  align-items: center;
  gap: 5px;
  overflow: hidden;         /* ← stops long names breaking the layout */
}

#standings-table .tn {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;  /* ← long names get ... instead of wrapping */
  color: var(--cream);
}

.grp {
  display: inline-block;
  width: 16px;           /* fixed width regardless of letter */
  height: 16px;          /* fixed height */
  line-height: 16px;     /* vertically centres the letter */
  text-align: center;    /* horizontally centres the letter */
  font-size: 9px;
  font-weight: 600;
  color: #fff;
}

</style>
</head>

async function fetchWinProbabilities() {

  // ── Currently using: The Odds API ───────────────
  // To switch provider: replace everything inside
  // this function and update the normaliser below.
  // Nothing outside this function needs to change.

  const url = `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup_winner/odds` +
              `?apiKey=${Odds_KEY}&regions=uk&markets=outrights&oddsFormat=decimal`;

  const Football_url = `https://api.football-data.org/v4`;
  
  const headers = { 'X-Auth-Token': Football_KEY };
  const res = await fetch(url);

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `API error ${res.status}`);
  }

  const data = await res.json();
  return normaliseTheOddsAPI(data);
}

// Normaliser for The Odds API outright response
function normaliseTheOddsAPI(data) {
  const probs = {};
  if (!data || !data.length) return probs;

  // Average across all bookmakers for a fair probability
  const sums = {};
  const counts = {};

  data.forEach(event => {
    event.bookmakers?.forEach(bm => {
      bm.markets?.forEach(market => {
        if (market.key !== 'outrights') return;
        market.outcomes?.forEach(o => {
          const name = normaliseCountryName(o.name);
          const implied = parseFloat((1 / o.price * 100).toFixed(2));
          sums[name] = (sums[name] || 0) + implied;
          counts[name] = (counts[name] || 0) + 1;
        });
      });
    });
  });

  Object.keys(sums).forEach(name => {
    probs[name] = parseFloat((sums[name] / counts[name]).toFixed(2));
  });

  // Log all available team names to console — useful for
  // matching your PARTICIPANTS array to API names
  console.log('Teams returned by API:', Object.keys(probs).sort().join(', '));

  return probs;
}

// CACHING — saves API requests
// ─────────────────────────────────────────────────
function getCached(key) {
  try {
    const raw = localStorage.getItem(key);
    const ts  = localStorage.getItem(`${key}_ts`);
    if (!raw || !ts) return null;
    if (Date.now() - parseInt(ts) > CACHE_MS) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function setCache(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify(data));
    localStorage.setItem(`${key}_ts`, Date.now());
  } catch {}
}

function getCacheAge(key) {
  const ts = localStorage.getItem(`${key}_ts`);
  if (!ts) return null;
  const mins = Math.floor((Date.now() - parseInt(ts)) / 60000);
  if (mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins/60)}h ago`;
}

function filterUpcoming(matches){
  const now = new Date();
  return matches
    .filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED')//&& new Date(m.utcDate) > now)
    .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate))
    .slice(0, 5);
}

function filterResults(matches){
  return matches
    .filter(m => m.status === 'FINISHED')
    .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate))
    .slice(0, 5);
}

// ─────────────────────────────────────────────────
// STANDINGS CALC
// ─────────────────────────────────────────────────
function calcStandings(probs, eliminated, crests = {}) {
  return PARTICIPANTS.map(p => {
    const c1elim = eliminated.has(p.c1);
    const c2elim = eliminated.has(p.c2);
    const p1 = c1elim ? 0 : (probs[p.c1] || 0);
    const p2 = c2elim ? 0 : (probs[p.c2] || 0);
    const totalProb = parseFloat((p1 + p2).toFixed(2));
    return {
      ...p,
      c1elim, c2elim,
      p1, p2,
      totalProb,
      isEliminated: c1elim && c2elim,
      crest1: crests[p.c1] || null,
      crest2: crests[p.c2] || null,
    };
  }).sort((a, b) => b.totalProb - a.totalProb);
}

function flattenStandings(standingsData) {
  if (!standingsData?.standings) return [];

  const allTeams = [];

  standingsData.standings.forEach(group => {
    console.log('raw group value:', group.group);
    // each group has a 'table' array of team rows
    group.table?.forEach(row => {
      allTeams.push({
        position:    row.position,
        group:       group.group, // e.g. 'GROUP_A'
        groupLabel:  group.group.slice(-1).toUpperCase(), // 'A', 'B' etc
        name:        row.team.name,
        crest:       row.team.crest,
        id:          row.team.id,
        played:      row.playedGames,
        won:         row.won,
        drawn:       row.draw,
        lost:        row.lost,
        goalsFor:    row.goalsFor,
        goalsAgainst:row.goalsAgainst,
        gd:          row.goalDifference,
        points:      row.points,
        form:        row.form || '',  // e.g. 'W,L,D' — may be null early on
      });
    });
  });

  // sort: points → GD → goals for → name (alphabetical tiebreaker)
  return allTeams.sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.gd     !== a.gd)     return b.gd     - a.gd;
    if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
    return a.name.localeCompare(b.name);
  });
}

function renderStandings(footballData, probs) {
  const container = document.getElementById('standings-table');
  if (!footballData?.standings || footballData.standings.length === 0) {
    container.innerHTML = '<p style="font-size:12px;color:var(--muted);">Standings not available yet</p>';
    return;
  }

  // group colour map — extend as needed for all 12 groups
  const GROUP_COLOURS = {
    A:'#534AB7', B:'#1D9E75', C:'#D85A30', D:'#D4537E',
    E:'#378ADD', F:'#639922', G:'#BA7517', H:'#E24B4A',
    I:'#0F6E56', J:'#993C1D', K:'#7B6FD4', L:'#4DBDBD'
  };

  // form dot helper
  function formDots(formStr) {
    if (!formStr) return '<span style="font-size:10px;color:var(--muted);">—</span>';
    return formStr.split(',').slice(0, 3).map(r => {
      const cls = r === 'W' ? 'fw' : r === 'D' ? 'fdraw' : 'fl';
      return `<span class="fd ${cls}"></span>`;
    }).join('');
  }

  // position row colour
  function rowClass(pos, pts) {
    if (pts >= 7) return 'top';
    if (pos >= 33) return 'bot';
    return 'mid';
  }

  // find sweepstake owner
  function getOwner(teamName) {
    const p = PARTICIPANTS.find(p => p.c1 === teamName || p.c2 === teamName);
    return p ? p.name : null;
  }

  const rows = footballData.standings.map((team, i) => {
    const owner = getOwner(team.name);
    const prob  = probs?.[team.name];
    const probDisplay = prob
      ? `<span class="prob" style="color:${prob > 5 ? '#3B6D11' : prob > 1 ? '#7a4b00' : '#999'};">${prob}%</span>`
      : '<span style="color:var(--muted);">—</span>';
    const groupColor = GROUP_COLOURS[team.groupLabel] || '#888';

    //container.style.animationDelay = `${i * 40}ms`;

    return `
      <tr class="${rowClass(i + 1, team.points)}">
        <td>${i + 1}</td>
        <td>
          <div class="tc">
            <img class="standings-crest" src="${team.crest}" onerror="this.style.display='none'">
            <span class="tn">${team.name}</span>
            ${owner ? `<span class="participant">${owner}</span>` : ''}
          </div>
        </td>
        <td><span class="grp" style="background:${groupColor};">${team.groupLabel}</span></td>
        <td>${team.played}</td>
        <td>${team.won}</td>
        <td>${team.drawn}</td>
        <td>${team.lost}</td>
        <td>${team.gd >= 0 ? '+' : ''}${team.gd}</td>
        <td class="pts">${team.points}</td>
        <td>${probDisplay}</td>
        <!-- <td>${formDots(team.form)}</td> -->
      </tr>`;
  }).join('');

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th style="text-align:left;">Team</th>
          <th>Group</th>
          <th>P</th>
          <th>W</th>
          <th>D</th>
          <th>L</th>
          <th>GD</th>
          <th>Pts</th>
          <th>Prob%</th>
          <!-- <th>Form</th> -->
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}



// ─────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────
async function init(forceRefresh = false) {
  console.log('INIT STARTED');
  const errorBox = document.getElementById('error-box');
  const infoBox  = document.getElementById('info-box');
  errorBox.style.display = 'none';
  infoBox.style.display  = 'none';

  document.getElementById('subtitle').textContent =
    `${PARTICIPANTS.length} participants · ${PARTICIPANTS.length * 2} countries`;

  const eliminated = getEliminated();
  let probs = {};
  let footballData = null;


  // Use cache if fresh and not forcing refresh
  const cached = !forceRefresh && getCached();

  if (cached) {
    probs = cached;
    document.getElementById('footer-updated').textContent =
      `Odds cached · updated ${getCacheAge()}`;
  } else if (Odds_KEY === '') {
    // No key yet — show info, use zero probs (equal ranking by name)
    infoBox.textContent =
      'Add your API key from the-odds-api.com to show real win probabilities. ' +
      'Until then participants are listed alphabetically with 0%.';
    infoBox.style.display = 'block';
    document.getElementById('footer-updated').textContent = 'No API key set';
  } else {
    try {
      const btn = document.getElementById('btn-refresh');
      btn.classList.add('spinning');
      probs = await fetchWinProbabilities();
      setCache(probs);
      btn.classList.remove('spinning');
      document.getElementById('footer-updated').textContent =
        `Odds updated just now · next auto-refresh in 6h`;
    } catch (err) {
      document.getElementById('btn-refresh').classList.remove('spinning');
      errorBox.textContent = `Could not fetch odds: ${err.message}. Using cached data if available.`;
      errorBox.style.display = 'block';
      const fallback = getCached();
      if (fallback) probs = fallback;
      document.getElementById('footer-updated').textContent = `Using cached odds · ${getCacheAge()}`;
    }
  }
  console.log('REACHED BLOCK 2');


  // ── BLOCK 2: football data (fixtures, results, groups) ─
  const cachedFootball = !forceRefresh && getCached('wc26_football');
  console.log('cachedFootball:', cachedFootball);
  
  if (cachedFootball) {
    footballData = cachedFootball;
  } else {
    try {
      footballData = await fetchAllData();
      setCache('wc26_football', footballData);
    } catch (err) {
      errorBox.textContent = `Could not fetch fixtures: ${err.message}`;
      errorBox.style.display = 'block';
      const fallback = getCached('wc26_football');
      if (fallback) footballData = fallback;
    }
  }
  console.log('BLOCK 2 DONE, footballData:', footballData);
  const standings = calcStandings(probs, eliminated, footballData?.crests);
  render(standings,footballData);
  renderUpcoming(footballData);
  renderResults(footballData);
  renderStandings(footballData, probs);
  //console.log('footballData going into render:', footballData); // add this

  window._probs        = probs;
  window._participants = PARTICIPANTS;
}

  localStorage.removeItem('wc26_odds');
  localStorage.removeItem('wc26_odds_ts');
  localStorage.removeItem('wc26_football');
  localStorage.removeItem('wc26_football_ts');
  init(true);
}
window.manualRefresh = manualRefresh;

// Auto-refresh every CACHE_MS if page is left open
setInterval(() => init(), CACHE_MS);
